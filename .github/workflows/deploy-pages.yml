# Builds the static site and deploys to GitHub Pages. Writes config.js from secrets so all
# visitors load the same data without per-browser Setup.
#
# Mode A — Cloudflare proxy (Airtable PAT never in the Pages bundle):
#   DATA_PROXY_URL     — Worker origin, no trailing slash, e.g. https://….workers.dev
#   AIRTABLE_BASE_ID   — app… (must match the worker’s AIRTABLE_BASE_ID)
# Optional: DATA_PROXY_KEY (same as Worker BROWSER_KEY), AIRTABLE_TABLE_NAME, AIRTABLE_VIEW_NAME
#
# Mode B — PAT in config.js (simpler, but token is in the deployed script):
#   AIRTABLE_PAT       — read-only PAT
#   AIRTABLE_BASE_ID
# Optional: AIRTABLE_TABLE_NAME, AIRTABLE_VIEW_NAME
#
# If Mode A secrets are set, Mode B PAT is ignored for config.js.
#
# Settings → Pages → Build and deployment → Source: GitHub Actions (not “Deploy from branch”).

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        env:
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_NAME: ${{ secrets.AIRTABLE_TABLE_NAME }}
          AIRTABLE_VIEW_NAME: ${{ secrets.AIRTABLE_VIEW_NAME }}
          DATA_PROXY_URL: ${{ secrets.DATA_PROXY_URL }}
          DATA_PROXY_KEY: ${{ secrets.DATA_PROXY_KEY }}
        run: |
          set -e
          mkdir -p _site
          for f in index.html dashboard.js token.example.txt q4_ctrec_ai_dashboard.html .nojekyll config.example.js README.md; do
            if [ -f "$f" ]; then cp "$f" _site/; fi
          done
          node <<'NODE'
          const fs = require('fs');
          const pat = process.env.AIRTABLE_PAT || '';
          const proxyUrl = (process.env.DATA_PROXY_URL || '').trim().replace(/\/+$/, '');
          const proxyKey = process.env.DATA_PROXY_KEY || '';
          const baseId = process.env.AIRTABLE_BASE_ID || '';
          const table = process.env.AIRTABLE_TABLE_NAME || 'Initiatives';
          const view = process.env.AIRTABLE_VIEW_NAME || '';
          let body;
          if (proxyUrl && baseId) {
            body =
              'Object.assign(window.DASHBOARD_CONFIG, {\n' +
              '  siteWideConnection: true,\n' +
              '  airtablePat: "",\n' +
              '  dataProxyUrl: ' +
              JSON.stringify(proxyUrl) +
              ',\n' +
              (proxyKey
                ? '  dataProxyKey: ' + JSON.stringify(proxyKey) + ',\n'
                : '') +
              '  baseId: ' +
              JSON.stringify(baseId) +
              ',\n' +
              '  tableName: ' +
              JSON.stringify(table) +
              ',\n' +
              '  viewName: ' +
              JSON.stringify(view) +
              ',\n' +
              '});\n';
          } else if (pat && baseId) {
            body =
              'Object.assign(window.DASHBOARD_CONFIG, {\n' +
              '  siteWideConnection: true,\n' +
              '  airtablePat: ' +
              JSON.stringify(pat) +
              ',\n' +
              '  baseId: ' +
              JSON.stringify(baseId) +
              ',\n' +
              '  tableName: ' +
              JSON.stringify(table) +
              ',\n' +
              '  viewName: ' +
              JSON.stringify(view) +
              ',\n' +
              '});\n';
          } else {
            body =
              '/* Add Actions secrets: DATA_PROXY_URL + AIRTABLE_BASE_ID (recommended), or AIRTABLE_PAT + AIRTABLE_BASE_ID. */\n';
          }
          fs.writeFileSync('_site/config.js', body, 'utf8');
          NODE

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
