<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q4 FY26 — CTREC AI Initiatives Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #1a1a2e; }

  .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: white; padding: 24px 32px; display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; }
  .header h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
  .header .subtitle { color: #94a3b8; font-size: 13px; margin-top: 4px; }
  .header .updated { color: #64748b; font-size: 12px; margin-top: 8px; }
  .header-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .header-actions button { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25); color: white; border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .header-actions button:hover { background: rgba(255,255,255,0.2); }

  .summary-bar { display: flex; gap: 12px; padding: 20px 32px; background: white; border-bottom: 1px solid #e2e8f0; flex-wrap: wrap; }
  .stat-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px 18px; min-width: 130px; text-align: center; }
  .stat-card .value { font-size: 28px; font-weight: 700; color: #1e293b; line-height: 1; }
  .stat-card .label { font-size: 11px; color: #64748b; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card.blue .value { color: #3b82f6; }
  .stat-card.green .value { color: #10b981; }
  .stat-card.orange .value { color: #f59e0b; }
  .stat-card.red .value { color: #ef4444; }
  .stat-card.teal .value { color: #14b8a6; }
  .stat-card.purple .value { color: #8b5cf6; }

  .controls { padding: 16px 32px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .controls label { font-size: 12px; font-weight: 600; color: #475569; margin-right: 4px; }
  .controls select, .controls input { border: 1px solid #cbd5e1; border-radius: 8px; padding: 7px 12px; font-size: 13px; background: white; color: #1e293b; outline: none; }
  .controls select:focus, .controls input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
  .search-box { min-width: 220px; }
  .reset-btn { background: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 8px; padding: 7px 14px; font-size: 13px; cursor: pointer; color: #475569; font-weight: 500; }
  .reset-btn:hover { background: #e2e8f0; }

  .main { padding: 24px 32px; max-width: 1600px; }

  .org-section { margin-bottom: 32px; }
  .org-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .org-title { font-size: 18px; font-weight: 700; color: #1e293b; }
  .org-count { background: #e2e8f0; color: #475569; border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 600; }
  .org-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }

  .card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px; transition: box-shadow 0.2s, transform 0.1s; position: relative; overflow: hidden; }
  .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); transform: translateY(-1px); }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .card.status-on-track::before { background: #10b981; }
  .card.status-in-progress::before { background: #f59e0b; }
  .card.status-not-started::before { background: #94a3b8; }
  .card.status-unknown::before { background: #e2e8f0; }

  .card-name { font-size: 14px; font-weight: 600; color: #1e293b; margin-bottom: 8px; line-height: 1.4; }
  .card-desc { font-size: 12px; color: #64748b; line-height: 1.5; margin-bottom: 12px; min-height: 36px; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 6px; }

  .badge { display: inline-flex; align-items: center; gap: 4px; border-radius: 6px; padding: 3px 8px; font-size: 11px; font-weight: 600; }
  .badge-status-on-track { background: #d1fae5; color: #065f46; }
  .badge-status-in-progress { background: #fef3c7; color: #92400e; }
  .badge-status-not-started { background: #e0e7ff; color: #3730a3; }
  .badge-status-unknown { background: #f1f5f9; color: #64748b; }
  .badge-priority-p0 { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
  .badge-priority-p1 { background: #fff7ed; color: #9a3412; border: 1px solid #fed7aa; }
  .badge-priority-p2 { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
  .badge-impact-high { background: #ccfbf1; color: #134e4a; }
  .badge-impact-medium { background: #e0f2fe; color: #0c4a6e; }
  .badge-impact-low { background: #f1f5f9; color: #475569; }
  .badge-ctrec { background: #faf5ff; color: #6b21a8; border: 1px solid #e9d5ff; }
  .badge-new { background: #fdf4ff; color: #86198f; border: 1px solid #f0abfc; }

  .no-results { text-align: center; padding: 60px 20px; color: #94a3b8; }

  .update-banner { background: linear-gradient(90deg, #f0fdf4, #dcfce7); border: 1px solid #bbf7d0; border-radius: 10px; padding: 14px 20px; margin-bottom: 20px; display: flex; gap: 10px; align-items: flex-start; }
  .update-banner .icon { font-size: 18px; }
  .update-banner h3 { font-size: 13px; font-weight: 700; color: #065f46; margin-bottom: 6px; }
  .update-banner ul { list-style: none; columns: 2; }
  .update-banner li { font-size: 12px; color: #047857; padding: 2px 0; }
  .update-banner li::before { content: '• '; }

  .hidden { display: none !important; }

  .dot-oz { background: #f59e0b; }
  .dot-tns-us { background: #3b82f6; }
  .dot-iai { background: #ef4444; }
  .dot-dsx { background: #10b981; }
  .dot-finance { background: #8b5cf6; }
  .dot-mle { background: #ec4899; }
  .dot-research { background: #f97316; }

  @media (max-width: 768px) {
    .header, .summary-bar, .controls, .main { padding-left: 16px; padding-right: 16px; }
    .cards-grid { grid-template-columns: 1fr; }
    .stat-card { min-width: 100px; }
    .update-banner ul { columns: 1; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Q4 FY26 — CTREC AI Initiatives Dashboard</h1>
    <div class="subtitle">Trust &amp; Safety · AI &amp; Risk · Cross-team Q4 Planning</div>
    <div class="updated" id="header-updated">Connect Airtable to load live data</div>
  </div>
  <div class="header-actions">
    <button type="button" onclick="window.__openDashboardSetup && window.__openDashboardSetup()">Setup</button>
    <button type="button" id="btn-refresh" onclick="window.__refreshDashboard && window.__refreshDashboard()">Refresh now</button>
  </div>
</div>

<div class="summary-bar">
  <div class="stat-card blue">
    <div class="value" id="total-count">—</div>
    <div class="label">Total Initiatives</div>
  </div>
  <div class="stat-card green">
    <div class="value" id="stat-ontrack">—</div>
    <div class="label">In Progress / On Track</div>
  </div>
  <div class="stat-card orange">
    <div class="value" id="stat-notstarted">—</div>
    <div class="label">Not Started</div>
  </div>
  <div class="stat-card red">
    <div class="value" id="stat-p0">—</div>
    <div class="label">P0 Items</div>
  </div>
  <div class="stat-card teal">
    <div class="value" id="stat-high">—</div>
    <div class="label">High Impact</div>
  </div>
  <div class="stat-card purple">
    <div class="value" id="stat-orgs">—</div>
    <div class="label">Active Orgs</div>
  </div>
</div>

<div class="controls">
  <div>
    <label for="filter-status">Status:</label>
    <select id="filter-status" onchange="applyFilters()">
      <option value="">All Statuses</option>
      <option value="on track">On Track</option>
      <option value="in progress">In Progress</option>
      <option value="not started">Not Started</option>
      <option value="unknown">Not Set</option>
    </select>
  </div>
  <div>
    <label for="filter-priority">Priority:</label>
    <select id="filter-priority" onchange="applyFilters()">
      <option value="">All Priorities</option>
      <option value="P0">P0</option>
      <option value="P1">P1</option>
      <option value="P2">P2</option>
    </select>
  </div>
  <div>
    <label for="filter-impact">Impact:</label>
    <select id="filter-impact" onchange="applyFilters()">
      <option value="">All Impact</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>
  </div>
  <div>
    <label for="filter-org">Org:</label>
    <select id="filter-org" onchange="applyFilters()">
      <option value="">All Orgs</option>
      <option value="oz">OZ (TnS IL)</option>
      <option value="tns-us">TnS US</option>
      <option value="iai">IAI</option>
      <option value="dsx">DSX/TISO AI</option>
      <option value="finance">Finance</option>
      <option value="mle">MLE</option>
      <option value="research">Research</option>
    </select>
  </div>
  <div>
    <input type="text" id="search-box" class="search-box" placeholder="Search initiatives..." oninput="applyFilters()">
  </div>
  <button class="reset-btn" onclick="resetFilters()">Reset Filters</button>
</div>

<div class="main" id="main-content">
  <div id="dashboard-mount">
    <div style="padding:48px;text-align:center;color:#64748b;font-size:14px;">Loading…</div>
  </div>
</div>

<script>
window.DASHBOARD_CONFIG = Object.assign(
  {
    airtablePat: '',
    baseId: '',
    tableName: 'Initiatives',
    viewName: '',
    refreshMs: 300000,
    fields: {
      name: 'Name',
      description: 'Description',
      status: 'Status',
      priority: 'Priority',
      impact: 'Impact',
      org: 'Org',
      isNew: 'New',
    },
    orgSlugMap: {
      'oz (tns il)': 'oz',
      oz: 'oz',
      'tns us': 'tns-us',
      'tns-us': 'tns-us',
      iai: 'iai',
      'dsx/tiso ai': 'dsx',
      dsx: 'dsx',
      finance: 'finance',
      mle: 'mle',
      research: 'research',
    },
  },
  window.DASHBOARD_CONFIG || {}
);
</script>
<script src="config.js"></script>
<script src="dashboard.js?v=13"></script>

</body>
</html>
